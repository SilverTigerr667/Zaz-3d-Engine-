<!DOCTYPE html>
<html>
<head>
    <title>Zaz Engine Editor Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; font-family: monospace; border-radius: 5px; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <h3>3D Vibe Editor</h3>
        <button onclick="addCube()">Add Cube</button>
        <p>Drag to Orbit | Scroll to Zoom</p>
    </div>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        // Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Camera Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.z = 5;

        // Add Ground
        const gridHelper = new THREE.GridHelper(10, 10);
        scene.add(gridHelper);

        // Object Array for Editing
        const objects = [];

        // Function to add objects (The "Editor" part)
        function addCube() {
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(
                (Math.random() - 0.5) * 4,
                0.25,
                (Math.random() - 0.5) * 4
            );
            scene.add(cube);
            objects.push(cube);
        }

        // Add initial object
        addCube();

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            // Example "Cool" effect: rotate objects
            objects.forEach(obj => {
                obj.rotation.x += 0.01;
                obj.rotation.y += 0.01;
            });
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
