<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 3D Engine Editor</title>
    <!-- Import Model Viewer Component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; }
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <!-- 3D Viewer Element -->
    <model-viewer 
        src="model.glb" 
        alt="A 3D model" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1" 
        interaction-prompt="auto">
    </model-viewer>
</body>
</html>
